<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fallback générique uniquement (chaque page fournit sa description via react-helmet) -->
    <title>ELM Sécurité - Point Fort Fichet Serrurier Lille</title>
    <meta name="robots" content="index, follow" />

    <!-- Image Open Graph / Twitter : défaut site-wide (constante). Le texte (og:title,
         og:description, og:url) est fourni par page via react-helmet. -->
    <meta property="og:image" content="https://serrurier-urgence-lille.fr/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://serrurier-urgence-lille.fr/og-image.jpg" />

    <!-- Favicon & Manifest -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E4F8C" />

    <!-- Preconnect (perf) -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5C6DJGDPWT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5C6DJGDPWT');
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
